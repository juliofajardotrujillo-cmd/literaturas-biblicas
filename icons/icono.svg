<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006c4a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- White background with rounded corners (safe zone for maskable) -->
  <rect width="512" height="512" rx="0" fill="#ffffff"/>

  <!-- Book icon centered with ~20% padding = safe zone 102..410 -->
  <g transform="translate(256,256)" stroke="url(#bookGrad)" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Back-left stack book 1 -->
    <path d="M-95,-138 L-130,-138 L-130,130 L-95,130" stroke-width="11"/>

    <!-- Back-left stack book 2 -->
    <path d="M-72,-152 L-108,-152 L-108,143 L-72,143" stroke-width="11"/>

    <!-- Left cover of open book -->
    <path d="M0,-158 Q-52,-168 -88,-154 L-88,150 Q-52,138 0,146 Z" stroke-width="11"/>

    <!-- Right cover of open book -->
    <path d="M0,-158 Q52,-168 88,-154 L88,150 Q52,138 0,146 Z" stroke-width="11"/>

    <!-- Center spine crease -->
    <line x1="0" y1="-158" x2="0" y2="146" stroke-width="11"/>

    <!-- Page lines left -->
    <path d="M-78,82 Q-40,89 -5,85" stroke-width="8"/>
    <path d="M-78,108 Q-40,115 -5,111" stroke-width="8"/>

    <!-- Page lines right -->
    <path d="M5,85 Q40,89 78,82" stroke-width="8"/>
    <path d="M5,111 Q40,115 78,108" stroke-width="8"/>

    <!-- Bookmark ribbon -->
    <path d="M-30,144 L-30,210 L0,192 L30,210 L30,144" stroke-width="11"/>

  </g>
</svg>
