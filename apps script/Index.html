    <script>
        let mode = "login";

        window.onload = function() {
            switchTab("login");
        };

        function showForgotPasswordModal() {
            const modal = document.getElementById('forgotPasswordModal');
            if (modal) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
            }
        }

        function closeForgotPasswordModal() {
            const modal = document.getElementById('forgotPasswordModal');
            if (modal) {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        function togglePasswordVisibility() {
            const passInput = document.getElementById('passInput');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.innerHTML = '<use href="#icon-visibility_off"></use>';
            } else {
                passInput.type = 'password';
                toggleIcon.innerHTML = '<use href="#icon-visibility"></use>';
            }
        }

        function toggleConfirmPasswordVisibility() {
            const confirmInput = document.getElementById('confirmPassword');
            const toggleIcon = document.getElementById('toggleConfirmPassword');
            
            if (confirmInput.type === 'password') {
                confirmInput.type = 'text';
                toggleIcon.innerHTML = '<use href="#icon-visibility_off"></use>';
            } else {
                confirmInput.type = 'password';
                toggleIcon.innerHTML = '<use href="#icon-check_circle"></use>';
            }
        }

        function switchTab(m) {
            if (m) {
                mode = m;
            } else {
                mode = mode === "login" ? "register" : "login";
            }

            const forgotBtn = document.getElementById("forgotPassword");
            const confirmGroup = document.getElementById("confirmPasswordGroup");

            if (mode === "login") {
                document.getElementById("pageTitle").innerText = "Iniciar Sesión";
                document.getElementById("pageSubtitle").innerText = "Acceda a su cuenta para continuar su estudio.";
                document.getElementById("submitBtnText").innerText = "Ingresar al Sistema";
                document.getElementById("footerQuestion").innerText = "¿Es nuevo en la plataforma?";
                document.getElementById("toggleLinkText").innerText = "Crear una cuenta";
                if (confirmGroup) confirmGroup.style.display = "none";
                if (forgotBtn) forgotBtn.style.display = "inline";
            } else {
                document.getElementById("pageTitle").innerText = "Crear Cuenta";
                document.getElementById("pageSubtitle").innerText = "Únase a la plataforma para gestionar su registro.";
                document.getElementById("submitBtnText").innerText = "Crear mi Cuenta";
                document.getElementById("footerQuestion").innerText = "¿Ya tiene una cuenta?";
                document.getElementById("toggleLinkText").innerText = "Iniciar sesión";
                if (confirmGroup) confirmGroup.style.display = "block";
                if (forgotBtn) forgotBtn.style.display = "none";
            }

            document.getElementById("msg").innerText = ""; 
        }

        function procesar() {
    const u = document.getElementById("userInput").value;
    const p = document.getElementById("passInput").value;

    if (!u || !p) {
        document.getElementById("msg").innerText = "Por favor, completa todos los campos";
        document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
        return;
    }

    const fn = mode === "register" ? "registrarUsuario" : "iniciarSesion";

    // BLOQUEAR el botón igual que "Enviar datos al servidor"
    const btn = document.getElementById("submitBtn");
    const btnTexto = document.getElementById("submitBtnText");
    btn.disabled = true;
    btn.style.opacity = "0.6";
    btn.style.cursor = "not-allowed";
    btn.style.transform = "scale(1)";
    btnTexto.innerText = mode === "register" ? "Creando cuenta..." : "Verificando credenciales...";

    document.getElementById("msg").innerText = "";
    document.getElementById("msg").className = "text-center text-sm font-bold text-on-surface-variant mt-4";

    google.script.run
        .withSuccessHandler((res) => {
            // DESBLOQUEAR siempre al terminar (éxito o error de validación)
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            btnTexto.innerText = mode === "register" ? "Crear mi Cuenta" : "Ingresar al Sistema";

            if (res === "OK") {
                sessionStorage.setItem("activeUser", u);
                // Al abrir la nueva página, el botón ya está libre (no importa)
                google.script.run
                    .withSuccessHandler((html) => {
                        document.open();
                        document.write(html);
                        document.close();
                    })
                    .cargarPaginaFormulario();
            } else if (res === "EXISTE") {
                document.getElementById("msg").innerText = "⚠️ El usuario ya existe. Por favor, inicie sesión o elija otro nombre.";
                document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
            } else if (res === "PASS_ERROR") {
                document.getElementById("msg").innerText = "❌ Contraseña incorrecta";
                document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
            } else if (res === "NO_EXISTE") {
                document.getElementById("msg").innerText = "❌ El usuario no está registrado";
                document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
            } else {
                document.getElementById("msg").innerText = "Error en la operación";
                document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
            }
        })
        .withFailureHandler((err) => {
            // DESBLOQUEAR también si hay un error del servidor
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            btnTexto.innerText = mode === "register" ? "Crear mi Cuenta" : "Ingresar al Sistema";

            document.getElementById("msg").innerText = "❌ Error de conexión con el servidor";
            document.getElementById("msg").className = "text-center text-sm font-bold text-error mt-4";
        })
    [fn](u, p);
}
    </script>
</body>
</html>
